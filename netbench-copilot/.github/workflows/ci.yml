name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Lint with ruff
      run: |
        uv run ruff check src/ tests/

    - name: Type check with mypy
      run: |
        uv run mypy src/
      continue-on-error: true  # Don't fail on type errors initially

    - name: Format check with black
      run: |
        uv run black --check src/ tests/

    - name: Run tests
      run: |
        uv run pytest tests/ -v --cov=src/netbench --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v2

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync

    - name: Security scan with bandit
      run: |
        uv pip install bandit
        uv run bandit -r src/ -f json -o bandit-report.json || true

    - name: Dependency vulnerability scan
      run: |
        uv pip install safety
        uv run safety check --json || true

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check documentation
      run: |
        # Check that all required docs exist
        test -f README.md
        test -f DESIGN.md
        test -f SECURITY.md
        test -f IMPLEMENTATION_GUIDE.md
        test -f docs/runbook.md || echo "⚠ docs/runbook.md missing"
        test -f docs/architecture.md || echo "⚠ docs/architecture.md missing"

    - name: Validate YAML files
      run: |
        sudo apt-get install -y yamllint
        yamllint data/kb/manifest.yaml || true
        yamllint .github/workflows/ci.yml

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v2

    - name: Set up Python
      run: uv python install 3.11

    - name: Build package
      run: |
        uv build

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/

